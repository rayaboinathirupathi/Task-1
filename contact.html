<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Thirupathi Portfolio</title>

  <meta
    name="description"
    content="Contact Thirupathi for collaboration, freelance projects, or job opportunities."
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <a class="skip-link" href="#main-content">
    Skip to main content
  </a>

  <header>
    <div class="container">

      <h1>Contact</h1>

      <nav aria-label="Main Navigation">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="certificates.html">Certificates</a></li>
          <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>

    </div>
  </header>

  <main id="main-content">

    <section aria-labelledby="contact-heading">
      <div class="container">

        <h2 id="contact-heading">Get In Touch</h2>

        <!-- Accessible Form -->
        <form aria-label="Contact Form">

          <div class="form-group">
            <label for="name">
              Full Name
            </label>

            <input
              type="text"
              id="name"
              name="name"
              required
              autocomplete="name"
            />
          </div>

          <div class="form-group">
            <label for="email">
              Email Address
            </label>

            <input
              type="email"
              id="email"
              name="email"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="message">
              Message
            </label>

            <textarea
              id="message"
              name="message"
              rows="6"
              required
            ></textarea>
          </div>

          <button type="submit">
            Send Message
          </button>

        </form>

      </div>
    </section>

  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Thirupathi</p>
    </div>
  </footer>

</body>
</html>
